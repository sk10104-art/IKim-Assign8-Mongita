{% extends 'base.html' %}
{% block container %}
<main style="display:block; padding:40px; max-width:600px; margin:auto;">
    <h1>Edit Book</h1>

    <form method="POST" action="{{ url_for('edit_post', book_id=book['bookId']) }}" style="margin-top:20px;">
        <label>Title:</label><br>
        <input type="text" name="title" value="{{ book['title'] }}" required
               style="width:100%; padding:6px;"><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" value="{{ book['author'] }}" required
               style="width:100%; padding:6px;"><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" value="{{ book['isbn'] }}" required
               style="width:100%; padding:6px;"><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" value="{{ book['price'] }}" required
               style="width:100%; padding:6px;"><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required style="width:100%; padding:6px;">
            {% for cat in categories %}
                {% if cat['categoryId'] == book['categoryId'] %}
                    <option value="{{ cat['categoryId'] }}" selected>{{ cat['categoryName'] }}</option>
                {% else %}
                    <option value="{{ cat['categoryId'] }}">{{ cat['categoryName'] }}</option>
                {% endif %}
            {% endfor %}
        </select><br><br>

        <label>Image filename:</label><br>
        <input type="text" name="image" value="{{ book['image'] }}" required
               style="width:100%; padding:6px;"><br><br>

        <label>Read Now:</label><br>
        <select name="readNow" style="width:100%; padding:6px;">
            {% if book['readNow'] == 1 %}
                <option value="0">0 - Not available to read</option>
                <option value="1" selected>1 - Available to read</option>
            {% else %}
                <option value="0" selected>0 - Not available to read</option>
                <option value="1">1 - Available to read</option>
            {% endif %}
        </select><br><br>

        <button type="submit" class="commandButton" style="border:none; cursor:pointer;">Save Changes</button>
        <a href="{{ url_for('read') }}" class="commandButton" style="background-color:#888;">Cancel</a>
    </form>
</main>
{% endblock %}
