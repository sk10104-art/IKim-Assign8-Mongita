{% extends 'base.html' %}
{% block container %}
<main style="display:block; padding:40px; max-width:600px; margin:auto;">
    <h1>Add a New Book</h1>

    <form method="POST" action="{{ url_for('create_post') }}" style="margin-top:20px;">
        <label>Title:</label><br>
        <input type="text" name="title" required style="width:100%; padding:6px;"><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" required style="width:100%; padding:6px;"><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" required style="width:100%; padding:6px;"><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" required style="width:100%; padding:6px;"><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required style="width:100%; padding:6px;">
            {% for cat in categories %}
                <option value="{{ cat['categoryId'] }}">{{ cat['categoryName'] }}</option>
            {% endfor %}
        </select><br><br>

        <label>Image filename:</label><br>
        <input type="text" name="image" placeholder="example.jpg" required style="width:100%; padding:6px;"><br><br>

        <label>Read Now:</label><br>
        <select name="readNow" style="width:100%; padding:6px;">
            <option value="0">0 - Not available to read</option>
            <option value="1">1 - Available to read</option>
        </select><br><br>

        <button type="submit" class="commandButton" style="border:none; cursor:pointer;">Add Book</button>
        <a href="{{ url_for('read') }}" class="commandButton" style="background-color:#888;">Cancel</a>
    </form>
</main>
{% endblock %}
